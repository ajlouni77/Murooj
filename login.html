</head>
<body>

    <!-- قسم تسجيل الدخول -->
<section id="login-section">
    <div class="login-container">
        <div class="login-info">
            <h2>مرحبًا بعودتك!</h2>
            <p>تسجيل الدخول للوصول إلى حسابك وإدارة طلباتك بسهولة.</p>
        </div>
        <div class="login-form">
            <h3>تسجيل الدخول</h3>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>
                </div>
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
                </div>
                <div class="form-actions">
                    <label>
                        <input type="checkbox" name="remember"> تذكرني
                    </label>
                    <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="login-btn">تسجيل الدخول</button>
                <p class="signup-link">ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a></p>
            </form>
        </div>
    </div>
</section>
<script type="module">
  // استيراد مكتبات Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js";

  // إعداد Firebase الخاص بك
  const firebaseConfig = {
    apiKey: "AIzaSyDTn4y3N-w6EHq-BFJ5UFFcNPU2isA2tdA",
    authDomain: "murooj-739bc.firebaseapp.com",
    projectId: "murooj-739bc",
    storageBucket: "murooj-739bc.appspot.com",
    messagingSenderId: "390503715440",
    appId: "1:390503715440:web:38e661f0c5ae74e9379ab5",
    measurementId: "G-PE3FR1E2WC"
  };

  // تهيئة Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // وظيفة تسجيل الدخول
  document.querySelector('.login-form').addEventListener('submit', (e) => {
    e.preventDefault(); // منع التحديث الافتراضي للنموذج

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // تسجيل الدخول باستخدام البريد الإلكتروني وكلمة المرور
    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        // تم تسجيل الدخول بنجاح
        const user = userCredential.user;
        alert("تم تسجيل الدخول بنجاح!");
        // إعادة توجيه المستخدم إلى صفحة أخرى
        window.location.href = "http://127.0.0.1:5500/home-page.html"; // استبدل بـ الصفحة المناسبة
      })
      .catch((error) => {
        // معالجة الأخطاء
        const errorCode = error.code;
        const errorMessage = error.message;
        alert(`خطأ: ${errorMessage}`);
      });
  });
</script>

</body>
